<h5 class="d-flex">
  <span class="flex-grow-1 ">{{ title }}</span>
  <span>{{ attribute.value | pip }}</span>
</h5>
<ul class="list-unstyled" *ngIf="attribute.skills.length">
  <li class="d-flex" *ngFor="let skill of attribute.skills">
    <span>{{ skill.name }}</span>
    <span class="flex-grow-1 border-bottom"></span>
    <span>{{ skill.value | pip }}</span>
  </li>
</ul>
