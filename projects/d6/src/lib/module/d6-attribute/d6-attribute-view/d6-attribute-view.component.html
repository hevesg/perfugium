<h5 class="d-flex justify-content-between border-bottom pb-2 mb-0">
  <span>{{ name }}</span>
  <span>{{ attribute.value }}</span>
</h5>
<ul class="list-group list-group-flush mb-4">
  <li *ngFor="let skill of attribute.skills" class="list-group-item d-flex justify-content-between">
    <span>{{ skill.name }}</span>
    <span>{{ skill.value }}</span>
  </li>
</ul>
